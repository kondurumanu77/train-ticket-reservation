name: ci pipeline for java code deploy

on: 
  push:
    branches:
      - main
  workflow_dispatch: 

jobs:
  builds:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      -  name: install java
         uses: actions/setup-java@v4
         with:
           distribution: 'temurin'
           java-version: '17'

      -  name: maven validate
         run: mvn validate
      -  name:  maven compile
         run: mvn compile
      -  name: maven test
         run: mvn test
      -  name: maven package
         run: mvn package
      -  name: verify war file
         run: ls -lh target/
  
