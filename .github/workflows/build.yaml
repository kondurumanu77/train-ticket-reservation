name: CI/CD Pipeline

on:
  push:
    branches:
      - master

  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      # Checkout Code
      - name: Checkout Source
        uses: actions/checkout@v4

      # Java 8 for Build
      - name: Setup Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      # Build Project
      - name: Build Project
        run: mvn clean install -DskipTests

      # Verify WAR
      - name: Verify WAR
        run: ls -lh target

     
